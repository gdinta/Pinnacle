<!-- web/templates/index.html - Complete with Money Moves Tab -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinnacle Financial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles_tabs.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='home_light.css') }}?v=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='analyze_light.css') }}?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>    
    <link rel="stylesheet" href="{{ url_for('static', filename='about_light.css') }}?v=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='results_light.css') }}?v=3">
</head>
<body>
    <!-- Navigation & Header -->
    <header class="navbar">
        <div class="container navbar-content">
            <div class="logo">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Pinnacle Financial Logo" class="logo-img">
                <span class="logo-wordmark">Pinnacle<span class="gradient-text-orange">Financial</span></span>
            </div>

            <nav class="navbar-tabs">
                <button class="tab-btn active" data-tab="home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Home
                </button>
                <button class="tab-btn" data-tab="analyze">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    Analyze
                </button>
                <button class="tab-btn" data-tab="results">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
                    Results
                </button>
                <button class="tab-btn" data-tab="money-moves">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    Simulation
                </button>
                <button class="tab-btn" data-tab="about">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                    About
                </button>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="tab-content-container">
        <div class="container">
            <!-- HOME TAB -->
            <div class="tab-content active" id="home-tab">
                {% include "tabs/_home.html" %}
            </div>

            <!-- ANALYZE TAB -->
            <div class="tab-content" id="analyze-tab">
                {% include "tabs/_analyze.html" %}
            </div>

            <!-- RESULTS TAB -->
            <div class="tab-content" id="results-tab">
                {% include "tabs/_results.html" %}
            </div>

            <!-- MONEY MOVES TAB -->
            <div class="tab-content" id="money-moves-tab">
                {% include "tabs/_money_moves.html" %}
            </div>

            <!-- ABOUT TAB -->
            <div class="tab-content" id="about-tab">
                {% include "tabs/_about.html" %}
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container footer-content">
            <div class="footer-brand">
                <span class="footer-wordmark">Pinnacle<span class="gradient-text-orange">Financial</span></span>
                <span class="footer-credit">&mdash; built by Godasrita</span>
            </div>
            <div class="footer-links">
                <a href="#" onclick="document.querySelector('[data-tab=\"about\"]').click(); return false;">About</a>
                <a href="https://github.com/gdinta" target="_blank" rel="noopener noreferrer" class="footer-github">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.09 3.29 9.4 7.86 10.93.57.1.78-.25.78-.55 0-.27-.01-1-.02-1.96-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.68-1.28-1.68-1.04-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.56-.29-5.25-1.28-5.25-5.7 0-1.26.45-2.29 1.19-3.09-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.79 0c2.2-1.49 3.17-1.18 3.17-1.18.64 1.59.24 2.77.12 3.06.74.8 1.18 1.83 1.18 3.09 0 4.43-2.69 5.4-5.26 5.69.42.36.78 1.08.78 2.17 0 1.56-.02 2.83-.02 3.22 0 .3.2.66.79.55A11.5 11.5 0 0 0 23.5 12c0-6.35-5.15-11.5-11.5-11.5Z"/></svg>
                    GitHub
                </a>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="{{ url_for('static', filename='script_tabs.js') }}"></script>
</body>
</html>
